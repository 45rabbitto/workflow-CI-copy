name: MLflow CI Pipeline

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  DOCKER_HUB_USERNAME: 45rabbitto
  DOCKER_HUB_REPO: diamonds-price-prediction-copy

jobs:
  mlflow-project:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    
    - name: Setup Conda
      uses: conda-incubator/setup-miniconda@v3
      with:
        python-version: 3.12.6
        environment-file: MLProject/conda.yaml
        activate-environment: mlflow-env
        auto-activate-base: false
    
    - name: Run MLflow project
      shell: bash -l {0}
      run: |
        cd MLProject
        mlflow run . -P test_size=0.2 -P random_state=42
    
    - name: Read run_id from file
      id: mlflow_run
      shell: bash -l {0}
      run: |
        RUN_ID=$(cat MLProject/run_id.txt)
        echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
        echo "RUN_ID=$RUN_ID"
    
    - name: Upload dataset as artifact
      uses: actions/upload-artifact@v4
      with:
        name: preprocessed-dataset
        path: MLProject/data_preprocessed/
        retention-days: 30
    
    - name: Copy model to docker build context
      run: |
        mkdir -p MLProject/docker_build
        cp -r MLProject/mlruns/0/${{ steps.mlflow_run.outputs.run_id }}/artifacts/model MLProject/docker_build/
        cp MLProject/Dockerfile MLProject/docker_build/
    
    - name: Build Docker Image
      run: |
        cd MLProject/docker_build
        docker build -t ${{ env.DOCKER_HUB_USERNAME }}/${{ env.DOCKER_HUB_REPO }}:latest .
    
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
    
    - name: Push Docker Image
      run: |
        docker push ${{ env.DOCKER_HUB_USERNAME }}/${{ env.DOCKER_HUB_REPO }}:latest
        docker tag ${{ env.DOCKER_HUB_USERNAME }}/${{ env.DOCKER_HUB_REPO }}:latest ${{ env.DOCKER_HUB_USERNAME }}/${{ env.DOCKER_HUB_REPO }}:${{ github.sha }}
        docker push ${{ env.DOCKER_HUB_USERNAME }}/${{ env.DOCKER_HUB_REPO }}:${{ github.sha }}
    
    - name: Upload model as artifact
      uses: actions/upload-artifact@v4
      with:
        name: trained-model
        path: MLProject/mlruns/0/${{ steps.mlflow_run.outputs.run_id }}/artifacts/model/
        retention-days: 30
